services:
  - type: web
    name: math-sprint
    runtime: node
    repo: https://github.com/caicaivic0322/math-ai
    branch: main
    plan: free
    buildCommand: npm install && npm run build
    startCommand: NEXT_DIST_DIR=.next-build npx next start -p $PORT
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NEXT_DIST_DIR
        value: .next-build
    healthCheckPath: /
    autoDeploy: true
